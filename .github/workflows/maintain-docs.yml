name: Deploy Docs

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build-deploy:
    name: Build and deploy docs
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache dependencies 💾
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies 🔧
        run: pip install -r requirements.txt

      # ✅ Validate config (helps catch errors early)
      - name: Validate MkDocs config
        run: mkdocs build --strict

      # ✅ Required for mike to push to gh-pages
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # ✅ VERSIONED DEPLOYMENT (main → main, develop → develop)
      - name: Deploy version 🚀
        run: |
          VERSION="${GITHUB_REF_NAME}"

          mike deploy "$VERSION" --update-aliases --push
          mike set-default "$VERSION" --push
