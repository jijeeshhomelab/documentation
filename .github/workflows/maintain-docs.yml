name: Deploy Docs

on:
  push:
    branches:
      - main
      - develop
      - 'master-*'
  workflow_dispatch:

jobs:
  build-deploy:
    name: Build and deploy docs
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache dependencies 💾
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies 🔧
        run: pip install -r requirements.txt

      - name: Validate MkDocs config
        run: mkdocs build --strict

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # ✅ SMART VERSION MAPPING
      - name: Deploy version 🚀
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          # Default version = branch name
          VERSION="$BRANCH"

          # Transform master-2.1 → 2.1
          if [[ "$BRANCH" == master-* ]]; then
            VERSION="${BRANCH#master-}"
          fi

          echo "Deploying version: $VERSION (from branch: $BRANCH)"

          mike deploy "$VERSION" --update-aliases --push

          # Set main as default landing page
          if [ "$BRANCH" = "main" ]; then
            mike set-default "$VERSION" --push
          fi
``
