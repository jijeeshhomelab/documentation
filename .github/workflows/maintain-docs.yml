name: Deploy Docs

on:
  push:
    branches:
      - main
      - develop
      - master-*
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies 🔧
        run: pip install -r requirements.txt

      - name: Validate MkDocs config
        run: mkdocs build --strict

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Deploy docs 🚀
        shell: bash
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          # Default version = branch name
          VERSION="$BRANCH"

          # Convert master-x.x → x.x
          if [[ "$BRANCH" == master-* ]]; then
            VERSION="${BRANCH#master-}"
          fi

          echo "Branch: $BRANCH"
          echo "Version: $VERSION"

          mike deploy "$VERSION" --update-aliases --push

          # Set main as default homepage
          if [ "$BRANCH" = "main" ]; then
            mike set-default "$VERSION" --push
          fi
