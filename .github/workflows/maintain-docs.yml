name: Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deploy:
    name: Build and deploy docs
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache dependencies 💾
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies 🔧
        run: pip install -r requirements.txt

      # ✅ IMPORTANT: configure git (required for mike)
      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      # ✅ Deploy using mike (VERSIONED deployment)
      - name: Deploy version 🚀
        run: |
          VERSION=${GITHUB_REF_NAME}

          if [ "$VERSION" = "main" ]; then
            mike deploy latest --update-aliases --push
            mike set-default latest --push
          else
            mike deploy $VERSION --update-aliases --push
          fi
``
