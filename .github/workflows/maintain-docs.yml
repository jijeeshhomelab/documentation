name: Deploy Docs

on:
  push:
    branches:
      - main
      - master-*
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies 🔧
        run: pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Deploy all branches 🚀
        shell: bash
        run: |
          git fetch --all

          BRANCHES=("main" "develop")

          # Add all master-* branches dynamically
          for b in $(git branch -r | grep 'origin/master-' | sed 's/origin\///'); do
            BRANCHES+=("$b")
          done

          for BRANCH in "${BRANCHES[@]}"; do
            echo "Processing $BRANCH"

            git checkout $BRANCH

            VERSION="$BRANCH"

            # Convert master-x.x → x.x
            if [[ "$BRANCH" == master-* ]]; then
              VERSION="${BRANCH#master-}"
            fi

            echo "Deploying version $VERSION"

            mike deploy "$VERSION" --update-aliases --push
          done

          # Set default
          mike set-default main --push
