name: Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository 🛎️
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ✅ IMPORTANT (needed to read all branches)

      - name: Setup Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies 🔧
        run: pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # ✅ AUTO DEPLOY ALL BRANCHES
      - name: Deploy all branches 🚀
        shell: bash
        run: |
          # Fetch all branches
          git fetch --all

          # Loop through target branches
          for BRANCH in $(git branch -r | grep -E 'origin/(main|develop|master-)' | sed 's|origin/||'); do

            echo "Processing branch: $BRANCH"

            # Checkout branch
            git checkout $BRANCH

            # Default version = branch name
            VERSION="$BRANCH"

            # Convert master-x.x → x.x
            if [[ "$BRANCH" == master-* ]]; then
              VERSION="${BRANCH#master-}"
            fi

            echo "Deploying version: $VERSION"

            mike deploy "$VERSION" --update-aliases --push
          done

          # ✅ Set main as default
          mike set-default main --push
``
